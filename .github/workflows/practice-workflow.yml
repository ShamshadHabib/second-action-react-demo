name: demo react app

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get repo code
        uses: actions/checkout@v6 
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Verify node 
        run: node -v
      - name: verify npm
        run: npm -v
      - name: Install dependencies
        run: npm ci 
      - name: test code
        run: npm run test
  deploy:
    needs: test
    runs-on: ubuntu-22.04
    steps:
      - name: Get repo code
        uses: actions/checkout@v6 
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Verify node 
        run: node -v
      - name: verify npm
        run: npm -v
      - name: Install dependencies
        run: npm ci 
      - name: deploy
        run: npm run build    

